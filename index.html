<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HamburgueriaZ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" class="logo">
    <h1>HamburgueriaZ</h1>
</header>

<div class="container">

    <!-- CARDÁPIO -->
    <div class="menu">

        <div class="filtros">
            <button onclick="filtrar('todos')">Todos</button>
            <button onclick="filtrar('tradicional')">Tradicionais</button>
            <button onclick="filtrar('premium')">Premium</button>
            <button onclick="filtrar('vegano')">Vegano</button>
        </div>

        <div id="cardapio" class="grid"></div>

    </div>

    <!-- CARRINHO -->
    <div class="carrinho">

        <h2>🛒 Carrinho</h2>
        <ul id="carrinhoLista"></ul>

        <h3>Total: R$ <span id="total">0</span></h3>

        <button onclick="finalizar()">Finalizar Pedido</button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
