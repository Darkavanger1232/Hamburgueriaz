<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HamburgueriaZ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login">
    <img src="logo.png" class="logo">

    <input type="text" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

    <img src="logo.png" class="logo">
    <h2>HamburgueriaZ</h2>

    <!-- FILTROS -->
    <div class="filtros">
        <button onclick="filtrar('todos')">Todos</button>
        <button onclick="filtrar('tradicional')">Tradicionais</button>
        <button onclick="filtrar('premium')">Premium</button>
        <button onclick="filtrar('vegano')">Vegano</button>
    </div>

    <!-- CARDÁPIO -->
    <div id="cardapio" class="grid"></div>

    <!-- CARRINHO -->
    <div class="carrinho-box">
        <h3>🛒 Carrinho</h3>
        <ul id="carrinho"></ul>

        <h2>Total: R$ <span id="totalFinal">0</span></h2>

        <button onclick="enviarPedido()">Finalizar Pedido</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
