<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HamburgueriaZ</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

<div class="login-box">

    <img src="img/logo.png" class="logo-login">

    <h2 id="titulo">Login</h2>

    <input id="nome" placeholder="Nome" style="display:none;">
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="acaoPrincipal()" class="btn">Entrar</button>

    <p id="toggle">
        Não tem conta? <span onclick="toggleMode()">Cadastrar</span>
    </p>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
