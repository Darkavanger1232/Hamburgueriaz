<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - HamburgueriaZ</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

</head>
<body>

<div class="login-container">

    <img src="logo.png" class="logo">

    <h2>HamburgueriaZ</h2>

    <!-- LOGIN -->
    <div id="loginBox">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="login()">Entrar</button>

        <p>Não tem conta? 
            <span onclick="mostrarCadastro()">Cadastrar</span>
        </p>
    </div>

    <!-- CADASTRO -->
    <div id="cadastroBox" style="display:none;">
        <input type="text" id="nome" placeholder="Nome">
        <input type="email" id="emailCad" placeholder="Email">
        <input type="password" id="senhaCad" placeholder="Senha">

        <button onclick="cadastrar()">Cadastrar</button>

        <p>Já tem conta? 
            <span onclick="mostrarLogin()">Entrar</span>
        </p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
