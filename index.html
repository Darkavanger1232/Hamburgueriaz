<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HamburgueriaZ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <img src="logo.png" class="logo">
    <h1>HamburgueriaZ</h1>
</header>

<!-- CATEGORIAS -->
<div class="categorias">
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('tradicional')">Tradicionais</button>
    <button onclick="filtrar('premium')">Premium</button>
    <button onclick="filtrar('vegano')">Vegano</button>
</div>

<!-- CONTEÚDO -->
<div class="container">

    <!-- CARDÁPIO -->
    <div id="cardapio"></div>

    <!-- CARRINHO -->
    <div class="carrinho-box">
        <h2>🛒 Carrinho</h2>
        <ul id="carrinho"></ul>
        <h3>Total: R$ <span id="total">0</span></h3>
        <button onclick="finalizar()">Finalizar Pedido</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
